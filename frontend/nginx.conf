server {
	listen 8080;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	# Statyczne pliki React - obsługa SPA (Single Page Application)
	location / {
		try_files $uri $uri/ /index.html;
	}

	# Proxy do backendu Node.js
	# Plik montowany jako bind mount z hosta – można zmieniać bez przebudowy obrazu
	location /api/ {
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Przekazuj nagłówki X-Cache ustawiane przez backend (Redis cache)
		proxy_pass_header X-Cache;

		# Trailing slash usuwa prefix /api przed przekazaniem do backendu
		proxy_pass http://backend:3000/;
	}
}
