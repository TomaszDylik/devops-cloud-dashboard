proxy_cache_path /var/cache/nginx/api_cache levels=1:2 keys_zone=stats_cache:10m max_size=100m inactive=1h use_temp_path=off;

server {
	listen 80;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location / {
		try_files $uri $uri/ /index.html;
	}

	location = /api/stats {
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		proxy_cache stats_cache;
		proxy_cache_valid 200 30s;
		add_header X-Cache-Status $upstream_cache_status always;

		proxy_pass http://my_backend:3000/stats;
	}

	location /api/ {
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# Trailing slash strips /api prefix before forwarding to backend.
		proxy_pass http://my_backend:3000/;
	}
}
